  <script>
    const API = '/api/v1';

    function offerApp() {
      return {
        offerId: new URLSearchParams(location.search).get('id'),
        offer: null, tab: 'overview', descExpanded: false, showNoLLMDialog: false,
        overview: null, loadingOverview: false,
        deleteConfirm: false, deleting: false,

        // Knowledge
        knowledgeItems: [], knowledgeTotal: 0,
        suggestions: null, inferring: false, saving: false,
        inferProgress: 0, inferProgressLabel: '', inferThinkingText: '',
        knowledgeSearchQ: '',
        showInferInput: false, inferHint: '', inferUrl: '', inferFile: null, inferFileName: '', inferExtracting: false,
        showAddManual: false,
        manualForm: { knowledge_type: 'selling_point', title: '', content_raw: '' },
        knowledgeMenu: null,
        showEditKnowledge: false,
        editForm: { id: null, knowledge_type: 'selling_point', title: '', content_raw: '' },

        get catEntries() {
          return [
            ['selling_point', t('kt_selling_point')], ['audience', t('kt_audience')], ['scenario', t('kt_scenario')],
            ['faq', t('kt_faq')], ['objection', t('kt_objection')], ['brand', t('kt_brand')], ['proof', t('kt_proof')],
          ];
        },

        // Tag category colors
        tagCategoryColors: {
          subject: 'bg-blue-50 text-blue-600',
          usage: 'bg-green-50 text-green-600',
          selling_point: 'bg-orange-50 text-orange-600',
          scenario: 'bg-purple-50 text-purple-600',
          channel_fit: 'bg-pink-50 text-pink-500',
          style: 'bg-cyan-50 text-cyan-600',
          emotion: 'bg-yellow-50 text-yellow-600',
          legacy: 'bg-gray-100 text-gray-500',
        },
        get tagCategoryLabels() {
          return {
            subject: t('tag_subject'), usage: t('tag_usage'), selling_point: t('tag_selling_point'), scenario: t('tag_scenario'),
            channel_fit: t('tag_channel_fit'), style: t('tag_style'), emotion: t('tag_emotion'), legacy: t('tag_legacy'),
          };
        },

        // Assets
        assets: [], assetsTotal: 0, uploading: false, hashing: false,
        duplicateDialog: null, // { asset, file, event } when duplicate detected
        previewAsset: null,   // asset object for preview modal
        assetMenu: null,      // asset id for dropdown menu
        editTagsAsset: null,  // asset object for tag editing modal
        editTagsForm: {},     // { category: 'tag1, tag2, ...' }
        searchQ: '', selectedTags: [], availableTags: [], searchTimer: null,
        assetTypeFilter: '', showTagPicker: false,
        tagCategories: ['subject','usage','selling_point','scenario','channel_fit','style','emotion'],
        get categoryLabels() { return { subject: t('tag_subject'), usage: t('tag_usage'), selling_point: t('tag_selling_point'), scenario: t('tag_scenario'), channel_fit: t('tag_channel_fit'), style: t('tag_style'), emotion: t('tag_emotion') }; },
        // BrandKit
        offerBrandKit: null, brandkitLoading: false, brandkitCreating: false,

        // Strategy Units
        strategyUnits: [], strategyUnitsTotal: 0,
        showUnitForm: false, editingUnit: null, savingUnit: false,
        unitForm: { name: '', audience_segment: '', scenario: '', marketing_objective: '', channel: '', strategy_stage: 'exploring', notes: '' },
        audienceOptions: [], scenarioOptions: [],

        get selectedCount() {
          if (!this.suggestions) return 0;
          let c = 0;
          for (const items of Object.values(this.suggestions)) for (const i of items) if (i._selected) c++;
          return c;
        },

        async init() {
          document.title = t('page_title') + ' - OpenLucid';
          const res = await fetch(`${API}/offers/${this.offerId}`);
          this.offer = await res.json();
          document.title = `${this.offer.name} - OpenLucid`;
          await Promise.all([this.fetchKnowledge(), this.fetchAssets(), this.fetchOverview()]);
        },

        async fetchOverview() {
          this.loadingOverview = true;
          try {
            const res = await fetch(`${API}/offers/${this.offerId}/coverage-review`);
            if (res.ok) this.overview = await res.json();
          } catch {}
          this.loadingOverview = false;
        },

        handleNextAction(action) {
          if (!action) return;
          if (action === 'add_knowledge' || action === 'add_audience' || action === 'add_scenario') {
            this.tab = 'knowledge';
          } else if (action === 'upload_assets') {
            this.tab = 'assets'; this.fetchAssets();
          } else if (action === 'create_strategy_unit') {
            this.tab = 'strategy'; this.fetchStrategyUnits();
          } else if (action === 'generate_topics') {
            this.openTopicPicker();
          }
        },

        async deleteOffer() {
          this.deleting = true;
          try {
            const res = await fetch(`${API}/offers/${this.offerId}`, { method: 'DELETE' });
            if (res.ok) { location.href = '/'; return; }
            alert(t('delete_failed'));
          } catch { alert(t('delete_failed')); }
          this.deleting = false;
          this.deleteConfirm = false;
        },

        // ── BrandKit ──
        async fetchBrandKit() {
          this.brandkitLoading = true;
          try {
            const res = await fetch(`${API}/brandkits?scope_type=offer&scope_id=${this.offerId}&page_size=1`);
            if (res.ok) {
              const data = await res.json();
              this.offerBrandKit = data.items && data.items.length > 0 ? data.items[0] : null;
            }
          } catch {}
          this.brandkitLoading = false;
        },

        async createOfferBrandKit() {
          this.brandkitCreating = true;
          try {
            const res = await fetch(`${API}/brandkits`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                scope_type: 'offer',
                scope_id: this.offerId,
                name: (this.offer?.name || t('tab_brandkit')) + ' ' + t('tab_brandkit'),
              }),
            });
            if (res.ok) {
              const kit = await res.json();
              location.href = `/brandkit.html?id=${kit.id}`;
            } else {
              const err = await res.json();
              alert(err.error?.message || t('save_failed'));
            }
          } catch { alert(t('save_failed')); }
          this.brandkitCreating = false;
        },

        // ── Knowledge ──
        async fetchKnowledge() {
          const res = await fetch(`${API}/knowledge?scope_type=offer&scope_id=${this.offerId}&page_size=100`);
          const data = await res.json();
          this.knowledgeItems = data.items;
          this.knowledgeTotal = data.total;
        },

        inferKnowledge() {
          this.inferHint = ''; this.inferUrl = ''; this.inferFile = null; this.inferFileName = '';
          this.showInferInput = true;
        },

        setInferFile(e) {
          const f = e.target.files?.[0];
          if (f) { this.inferFile = f; this.inferFileName = f.name; }
        },

        async startInfer() {
          this.inferExtracting = true;
          const parts = [];
          if (this.inferHint.trim()) parts.push(this.inferHint.trim());
          try {
            if (this.inferUrl.trim()) {
              const fd = new FormData(); fd.append('url', this.inferUrl.trim());
              const r = await fetch(`${API}/ai/extract-text`, { method: 'POST', body: fd });
              if (r.ok) { const d = await r.json(); if (d.text) parts.push(d.text); }
              else { const err = await r.json().catch(() => ({})); alert(err.detail || t('infer_url_failed')); }
            }
            if (this.inferFile) {
              const fd = new FormData(); fd.append('file', this.inferFile);
              const r = await fetch(`${API}/ai/extract-text`, { method: 'POST', body: fd });
              if (r.ok) { const d = await r.json(); if (d.text) parts.push(d.text); }
              else alert(t('infer_file_failed'));
            }
          } catch { alert(t('extract_error')); }
          this.inferExtracting = false;
          this.showInferInput = false;

          // If user provided no new material and knowledge is already substantial, warn
          if (!parts.length && this.knowledgeItems.length >= 10) {
            alert(t('infer_need_material'));
            return;
          }

          this.inferring = true;
          this.inferProgress = 0;
          this.inferProgressLabel = t('ai_analyzing');
          this.inferThinkingText = '';

          // Asymptotic progress curve
          const startTime = Date.now();
          const T = 20000;
          const timer = setInterval(() => {
            this.inferProgress = 98 * (1 - Math.exp(-(Date.now() - startTime) / T));
          }, 300);

          try {
            const existing = this.knowledgeItems.map(k => ({
              knowledge_type: k.knowledge_type, title: k.title, content_raw: k.content_raw || '',
            }));
            const desc = parts.length ? parts.join('\n\n') : (this.overview?.offer?.description || '');
            const res = await fetch(`${API}/ai/infer-offer-knowledge-stream`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.overview?.offer?.name || '',
                offer_type: this.overview?.offer?.offer_type || 'product',
                description: desc,
                language: getApiLang(),
                existing_knowledge: existing.length ? existing : null,
              }),
            });
            if (!res.ok) {
              clearInterval(timer);
              if (res.status === 503) { this.showNoLLMDialog = true; }
              else { alert(t('ai_infer_failed')); }
              this.inferring = false;
              return;
            }
            // Read SSE stream
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let data = null;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop();
              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                  const evt = JSON.parse(line.slice(6));
                  if (evt.type === 'thinking') {
                    this.inferThinkingText = (this.inferThinkingText + evt.text).slice(-200);
                    if (this.inferProgress < 95) this.inferProgress += 0.2;
                  } else if (evt.type === 'result') {
                    data = evt;
                  } else if (evt.type === 'error') throw new Error(evt.detail);
                } catch (e) { if (e.message && !e.message.includes('JSON')) throw e; }
              }
            }
            clearInterval(timer);
            if (!data) throw new Error('No result');
            this.inferProgress = 100;
            this.inferProgressLabel = t('done');
            for (const [cat, items] of Object.entries(data.suggestions)) {
              for (const item of items) {
                item._selected = true;
                item._editing = false;
                const exists = this.knowledgeItems.find(
                  k => k.knowledge_type === (item.knowledge_type || cat) && k.title === item.title
                );
                item._action = exists ? 'update' : 'create';
              }
            }
            this.suggestions = data.suggestions;
          } catch (e) {
            clearInterval(timer);
            const detail = e.message || '';
            alert(t('ai_infer_failed') + (detail ? '\n' + detail : ''));
          }
          this.inferring = false;
        },

        get filteredKnowledge() {
          const q = this.knowledgeSearchQ.trim().toLowerCase();
          if (!q) return this.knowledgeItems;
          return this.knowledgeItems.filter(k =>
            (k.title || '').toLowerCase().includes(q) || (k.content_raw || '').toLowerCase().includes(q)
          );
        },

        get updateItems() {
          if (!this.suggestions) return [];
          return Object.entries(this.suggestions).flatMap(([cat, items]) =>
            items.filter(i => i._action === 'update').map(i => ({...i, _cat: cat}))
          );
        },
        get createItems() {
          if (!this.suggestions) return [];
          return Object.entries(this.suggestions).flatMap(([cat, items]) =>
            items.filter(i => i._action === 'create').map(i => ({...i, _cat: cat}))
          );
        },

        selectAll() { for (const items of Object.values(this.suggestions)) for (const i of items) i._selected = true; },
        deselectAll() { for (const items of Object.values(this.suggestions)) for (const i of items) i._selected = false; },

        async saveSelected() {
          this.saving = true;
          const batch = [];
          for (const [cat, items] of Object.entries(this.suggestions))
            for (const item of items)
              if (item._selected) batch.push({ scope_type: 'offer', scope_id: this.offerId, knowledge_type: item.knowledge_type || cat, title: item.title, content_raw: item.content_raw });
          if (!batch.length) { this.saving = false; return; }
          const res = await fetch(`${API}/knowledge/batch-upsert`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scope_type: 'offer', scope_id: this.offerId, items: batch }),
          });
          if (res.ok) {
            this.suggestions = null;
            await this.fetchKnowledge();
          } else alert(t('save_failed'));
          this.saving = false;
        },

        async addManual() {
          const res = await fetch(`${API}/knowledge`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ scope_type: 'offer', scope_id: this.offerId, ...this.manualForm }),
          });
          if (res.ok) { this.showAddManual = false; this.manualForm = { knowledge_type: 'selling_point', title: '', content_raw: '' }; await this.fetchKnowledge(); }
        },

        openEditKnowledge(k) {
          this.editForm = { id: k.id, knowledge_type: k.knowledge_type, title: k.title, content_raw: k.content_raw || '' };
          this.showEditKnowledge = true;
        },

        async updateKnowledge() {
          const res = await fetch(`${API}/knowledge/${this.editForm.id}`, {
            method: 'PATCH', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: this.editForm.title, content_raw: this.editForm.content_raw, knowledge_type: this.editForm.knowledge_type }),
          });
          if (res.ok) {
            const item = this.knowledgeItems.find(k => k.id === this.editForm.id);
            if (item) { item.title = this.editForm.title; item.content_raw = this.editForm.content_raw; item.knowledge_type = this.editForm.knowledge_type; }
            this.showEditKnowledge = false;
          } else alert(t('save_failed'));
        },

        async deleteKnowledge(id) {
          if (!confirm(t('confirm_delete'))) return;
          await fetch(`${API}/knowledge/${id}`, { method: 'DELETE' });
          await this.fetchKnowledge();
        },

        // ── Assets ──
        async fetchAssets() {
          const res = await fetch(`${API}/assets?scope_type=offer&scope_id=${this.offerId}&page_size=50`);
          const data = await res.json();
          this.assets = data.items; this.assetsTotal = data.total;
        },
        async _hashFile(file) {
          const buf = await file.arrayBuffer();
          const digest = await crypto.subtle.digest('SHA-256', buf);
          return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
        },
        async uploadAsset(event) {
          const file = event.target.files[0];
          if (!file) return;

          // 1. Compute hash
          this.hashing = true;
          let hash;
          try { hash = await this._hashFile(file); }
          catch { hash = null; }
          this.hashing = false;

          // 2. Check for duplicate in this offer
          if (hash) {
            const res = await fetch(`${API}/assets/check-duplicate?hash=${hash}&scope_type=offer&scope_id=${this.offerId}`);
            if (res.ok) {
              const data = await res.json();
              if (data.exists) {
                this.duplicateDialog = { asset: data.asset, file };
                event.target.value = '';
                return;
              }
            }
          }

          // 3. Upload
          this.uploading = true;
          const fd = new FormData();
          fd.append('file', file); fd.append('scope_type', 'offer'); fd.append('scope_id', this.offerId);
          fd.append('asset_type', file.type.startsWith('video') ? 'video' : file.type.startsWith('audio') ? 'audio' : 'image');
          await fetch(`${API}/assets/upload`, { method: 'POST', body: fd });
          await this.fetchAssets();
          this.uploading = false; event.target.value = '';
          this._pollParseStatus();
        },
        goToDuplicateAsset() {
          if (!this.duplicateDialog) return;
          // Scroll to existing asset card in the list
          const assetId = this.duplicateDialog.asset.id;
          this.duplicateDialog = null;
          this.$nextTick(() => {
            const el = document.querySelector(`[data-asset-id="${assetId}"]`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
        },
        _pollParseStatus() {
          if (this._pollTimer) clearInterval(this._pollTimer);
          let polls = 0;
          this._pollTimer = setInterval(async () => {
            await this.fetchAssets();
            polls++;
            const pending = this.assets.some(a => ['pending','processing','tagging'].includes(a.parse_status));
            if (!pending || polls >= 90) clearInterval(this._pollTimer);  // stop after 3 min max
          }, 2000);
        },
        formatAssetDuration(sec) {
          if (sec == null) return '';
          const m = Math.floor(sec / 60);
          const s = Math.floor(sec % 60);
          return `${m}:${String(s).padStart(2, '0')}`;
        },
        formatAssetBytes(bytes) {
          if (!bytes) return '';
          if (bytes < 1024) return bytes + ' B';
          if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
          return (bytes / 1024 / 1024).toFixed(1) + ' MB';
        },

        flattenTags(tagsJson) {
          if (Array.isArray(tagsJson)) return tagsJson.map(t => ({ category: 'legacy', label: t }));
          if (!tagsJson || typeof tagsJson !== 'object') return [];
          return Object.entries(tagsJson).flatMap(([cat, tags]) =>
            (tags || []).map(t => ({ category: cat, label: t }))
          );
        },

        openEditTags(asset) {
          this.editTagsAsset = asset;
          const tags = asset.tags_json && typeof asset.tags_json === 'object' && !Array.isArray(asset.tags_json) ? asset.tags_json : {};
          this.editTagsForm = {};
          for (const cat of ['subject','usage','selling_point','scenario','channel_fit','style','emotion']) {
            this.editTagsForm[cat] = (tags[cat] || []).join(', ');
          }
        },

        async saveAssetTags() {
          const tags = {};
          for (const [cat, val] of Object.entries(this.editTagsForm)) {
            const arr = val.split(/[,，]/).map(s => s.trim()).filter(Boolean);
            if (arr.length) tags[cat] = arr;
          }
          await fetch(`${API}/assets/${this.editTagsAsset.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tags_json: tags }),
          });
          this.editTagsAsset = null;
          await this.fetchAssets();
        },

        async deleteAsset(id) {
          if (!confirm(t('confirm_delete_asset'))) return;
          await fetch(`${API}/assets/${id}`, { method: 'DELETE' });
          await this.fetchAssets();
        },

        isSearchActive() {
          return this.searchQ.trim() || this.selectedTags.length > 0 || this.assetTypeFilter;
        },
        onSearchInput() {
          clearTimeout(this.searchTimer);
          this.searchTimer = setTimeout(() => this.searchAssets(), 300);
        },
        async searchAssets() {
          if (!this.isSearchActive()) { await this.fetchAssets(); return; }
          const params = new URLSearchParams({ scope_type: 'offer', scope_id: this.offerId, page_size: '50' });
          if (this.searchQ.trim()) params.set('q', this.searchQ.trim());
          if (this.assetTypeFilter) params.set('asset_type', this.assetTypeFilter);
          if (this.selectedTags.length > 0) params.set('tags', this.selectedTags.map(t => t.label).join(','));
          const res = await fetch(`${API}/assets/search?${params}`);
          const data = await res.json();
          this.assets = data.items; this.assetsTotal = data.total;
        },
        async fetchTagAnalytics() {
          const res = await fetch(`${API}/assets/tag-analytics?scope_type=offer&scope_id=${this.offerId}`);
          if (res.ok) { const data = await res.json(); this.availableTags = data.items || data; }
        },
        toggleTag(t) {
          const idx = this.selectedTags.findIndex(s => s.category === t.category && s.label === t.tag);
          if (idx >= 0) this.selectedTags.splice(idx, 1);
          else this.selectedTags.push({ category: t.category, label: t.tag });
          this.searchAssets();
        },

        // ── Strategy Units ──
        async fetchStrategyUnits() {
          const res = await fetch(`${API}/strategy-units?offer_id=${this.offerId}&page_size=50`);
          const data = await res.json();
          this.strategyUnits = data.items;
          this.strategyUnitsTotal = data.total;
        },

        async loadKBOptions() {
          const res = await fetch(`${API}/knowledge?scope_type=offer&scope_id=${this.offerId}&page_size=100`);
          if (!res.ok) return;
          const data = await res.json();
          this.audienceOptions = [...new Set(data.items.filter(k => k.knowledge_type === 'audience').map(k => k.title))];
          this.scenarioOptions = [...new Set(data.items.filter(k => k.knowledge_type === 'scenario').map(k => k.title))];
        },

        openUnitForm(unit) {
          if (unit) {
            this.editingUnit = unit;
            this.unitForm = {
              name: unit.name,
              audience_segment: unit.audience_segment || '',
              scenario: unit.scenario || '',
              marketing_objective: unit.marketing_objective || '',
              channel: unit.channel || '',
              strategy_stage: unit.strategy_stage,
              notes: unit.notes || '',
            };
          } else {
            this.editingUnit = null;
            this.unitForm = { name: '', audience_segment: '', scenario: '', marketing_objective: '', channel: '', strategy_stage: 'exploring', notes: '' };
          }
          this.showUnitForm = true;
          this.loadKBOptions();
        },

        async saveUnit() {
          if (!this.unitForm.name.trim()) return;
          this.savingUnit = true;
          const body = {
            name: this.unitForm.name.trim(),
            audience_segment: this.unitForm.audience_segment || null,
            scenario: this.unitForm.scenario || null,
            marketing_objective: this.unitForm.marketing_objective || null,
            channel: this.unitForm.channel || null,
            strategy_stage: this.unitForm.strategy_stage,
            notes: this.unitForm.notes || null,
          };
          try {
            let res;
            if (this.editingUnit) {
              res = await fetch(`${API}/strategy-units/${this.editingUnit.id}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
              });
            } else {
              res = await fetch(`${API}/strategy-units`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...body, merchant_id: this.offer.merchant_id, offer_id: this.offerId }),
              });
            }
            if (!res.ok) {
              const err = await res.json().catch(() => null);
              const msg = err?.detail;
              alert(typeof msg === 'string' ? msg : Array.isArray(msg) ? msg.map(e => (e.loc||[]).join('.')+': '+e.msg).join('\n') : t('save_failed'));
              this.savingUnit = false; return;
            }
            this.showUnitForm = false;
            await this.fetchStrategyUnits();
          } catch { alert(t('save_failed')); }
          this.savingUnit = false;
        },

        async deleteUnit(id) {
          if (!confirm(t('confirm_delete'))) return;
          await fetch(`${API}/strategy-units/${id}`, { method: 'DELETE' });
          await this.fetchStrategyUnits();
        },

        openTopicPicker() {
          window.dispatchEvent(new CustomEvent('open-topic-picker', { detail: { offerId: this.offerId } }));
        },

        goToTopics(strategyUnitId) {
          let url = '/topic-studio.html?offer_id=' + this.offerId;
          if (strategyUnitId) url += '&strategy_unit_id=' + strategyUnitId;
          location.href = url;
        },

        unitObjectiveLabel(v) {
          return { reach_growth: t('mo_reach_growth'), lead_generation: t('mo_lead_generation'), conversion: t('mo_conversion'), education: t('mo_education'), traffic_redirect: t('mo_traffic_redirect'), other: t('mo_other') }[v] || v;
        },
        unitStageLabel(v) {
          return { exploring: t('ss_exploring'), rising: t('ss_rising'), stable: t('ss_stable'), declining: t('ss_declining') }[v] || v;
        },
        unitStageClass(v) {
          return { exploring:'bg-gray-100 text-gray-600', rising:'bg-green-100 text-green-700', stable:'bg-blue-100 text-blue-700', declining:'bg-orange-100 text-orange-700' }[v] || 'bg-gray-100 text-gray-600';
        },
      };
    }
  </script>
