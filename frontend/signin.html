<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLucid</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { accent: { DEFAULT: '#155EEF', hover: '#1849C6' } } } } }
  </script>
  <script src="/js/i18n.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none!important}</style>
  <script>
    // Already logged in → go home; no users → go to install
    fetch('/api/v1/auth/me').then(r => {
      if (r.ok) { location.href = '/'; return; }
      return fetch('/api/v1/auth/setup-status').then(r => r.json()).then(s => {
        if (s.needs_setup) location.href = '/install.html';
      });
    });
  </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4" x-data="signinApp()" x-init="init()">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="/images/logo.png" alt="OpenLucid" class="w-14 h-14 rounded-2xl mx-auto mb-4">
      <h1 class="text-2xl font-bold text-gray-900">OpenLucid</h1>
      <p class="text-gray-500 mt-1 text-sm" x-text="t('subtitle')"></p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <!-- ── Reset Password Mode ── -->
      <template x-if="mode === 'reset'">
        <div>
          <h2 class="text-base font-semibold text-gray-800 mb-1" x-text="t('reset_title')"></h2>
          <p class="text-sm text-gray-500 mb-6"><span x-text="t('reset_subtitle')"></span> <span class="font-medium text-gray-700" x-text="resetEmail"></span> <span x-text="t('reset_subtitle_suffix') || ''"></span></p>
          <form @submit.prevent="submitReset()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" x-text="t('new_password')"></label>
              <input x-model="resetForm.new_password" type="password" required :placeholder="t('new_password_placeholder')" autocomplete="new-password"
                     class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" x-text="t('confirm_password')"></label>
              <input x-model="resetForm.password_confirm" type="password" required :placeholder="t('confirm_placeholder')" autocomplete="new-password"
                     class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none"
                     :class="resetForm.password_confirm && resetForm.new_password !== resetForm.password_confirm ? 'border-red-400' : ''">
            </div>
            <p x-show="error" x-text="error" class="text-sm text-red-500 bg-red-50 rounded-lg px-3 py-2"></p>
            <p x-show="success" x-text="success" class="text-sm text-green-600 bg-green-50 rounded-lg px-3 py-2"></p>
            <button type="submit" :disabled="loading"
                    class="w-full bg-accent text-white py-2.5 rounded-xl text-sm font-medium hover:bg-accent-hover disabled:opacity-50 transition-colors">
              <span x-text="loading ? t('saving') : t('save_new_password')"></span>
            </button>
            <button type="button" @click="mode='login'; error=''; success=''" class="w-full text-center text-sm text-gray-400 hover:text-gray-600 mt-1" x-text="t('back_to_login')"></button>
          </form>
        </div>
      </template>

      <!-- ── Forgot Password Mode ── -->
      <template x-if="mode === 'forgot'">
        <div>
          <h2 class="text-base font-semibold text-gray-800 mb-1" x-text="t('forgot_title')"></h2>
          <p class="text-sm text-gray-500 mb-6" x-text="t('forgot_subtitle')"></p>
          <form @submit.prevent="submitForgot()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" x-text="t('email_label')"></label>
              <input x-model="forgotEmail" type="email" required :placeholder="t('email_placeholder')" autocomplete="email"
                     class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none">
            </div>
            <p x-show="error" x-text="error" class="text-sm text-red-500 bg-red-50 rounded-lg px-3 py-2"></p>
            <p x-show="success" x-text="success" class="text-sm text-green-600 bg-green-50 rounded-lg px-3 py-2"></p>
            <button type="submit" :disabled="loading"
                    class="w-full bg-accent text-white py-2.5 rounded-xl text-sm font-medium hover:bg-accent-hover disabled:opacity-50 transition-colors">
              <span x-text="loading ? t('sending') : t('send_reset_link')"></span>
            </button>
            <button type="button" @click="mode='login'; error=''; success=''" class="w-full text-center text-sm text-gray-400 hover:text-gray-600" x-text="t('back_to_login')"></button>
          </form>
        </div>
      </template>

      <!-- ── Login Mode ── -->
      <template x-if="mode === 'login'">
        <div>
          <h2 class="text-base font-semibold text-gray-800 mb-6" x-text="t('login_title')"></h2>
          <form @submit.prevent="submitLogin()" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" x-text="t('email_label')"></label>
              <input x-model="loginForm.email" type="email" required :placeholder="t('email_placeholder')" autocomplete="username"
                     class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5" x-text="t('password_label')"></label>
              <div class="relative">
                <input x-model="loginForm.password" :type="showPwd ? 'text' : 'password'" required :placeholder="t('password_placeholder')" autocomplete="current-password"
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-accent/20 focus:border-accent outline-none pr-10">
                <button type="button" @click="showPwd = !showPwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                  <svg x-show="!showPwd" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                  <svg x-show="showPwd" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                </button>
              </div>
            </div>
            <p x-show="error" x-text="error" class="text-sm text-red-500 bg-red-50 rounded-lg px-3 py-2"></p>
            <button type="submit" :disabled="loading"
                    class="w-full bg-accent text-white py-2.5 rounded-xl text-sm font-medium hover:bg-accent-hover disabled:opacity-50 transition-colors">
              <span x-text="loading ? t('logging_in') : t('login_btn')"></span>
            </button>
            <div class="text-center">
              <button type="button" @click="mode='forgot'; error=''; success=''" class="text-sm text-accent hover:underline" x-text="t('forgot_password')"></button>
            </div>
          </form>
        </div>
      </template>

    </div>
    <p class="text-center text-[11px] text-gray-400 mt-6">Powered by <a href="https://openlucid.ai/?ref=app" target="_blank" class="hover:text-gray-600 transition-colors">OpenLucid</a></p>
  </div>

  <script>
    function signinApp() {
      return {
        mode: 'login',
        loginForm: { email: '', password: '' },
        forgotEmail: '',
        resetForm: { new_password: '', password_confirm: '' },
        resetToken: '',
        resetEmail: '',
        showPwd: false, loading: false, error: '', success: '',

        init() {
          document.title = t('page_title') + ' - OpenLucid';
          const params = new URLSearchParams(location.search);
          const token = params.get('reset_token');
          if (token) {
            this.resetToken = token;
            try {
              const payload = JSON.parse(atob(token.split('.')[1]));
              this.resetEmail = payload.email || '';
            } catch {}
            this.mode = 'reset';
          }
        },

        async submitLogin() {
          this.error = ''; this.loading = true;
          try {
            const res = await fetch('/api/v1/auth/signin', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.loginForm),
            });
            const data = await res.json();
            if (res.ok) { location.href = '/'; }
            else { this.error = data.detail || t('login_failed'); }
          } catch { this.error = t('network_error'); }
          this.loading = false;
        },

        async submitForgot() {
          this.error = ''; this.success = ''; this.loading = true;
          try {
            const res = await fetch('/api/v1/auth/forgot-password', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: this.forgotEmail }),
            });
            const data = await res.json();
            if (res.ok) { this.success = data.message; }
            else { this.error = data.detail || t('request_failed'); }
          } catch { this.error = t('network_error'); }
          this.loading = false;
        },

        async submitReset() {
          this.error = ''; this.success = ''; this.loading = true;
          if (this.resetForm.new_password !== this.resetForm.password_confirm) {
            this.error = t('password_mismatch'); this.loading = false; return;
          }
          try {
            const res = await fetch('/api/v1/auth/reset-password', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: this.resetToken, ...this.resetForm }),
            });
            const data = await res.json();
            if (res.ok) {
              this.success = data.message + t('redirect_msg');
              setTimeout(() => { location.href = '/signin.html'; }, 3000);
            } else { this.error = data.detail || t('reset_failed'); }
          } catch { this.error = t('network_error'); }
          this.loading = false;
        },
      };
    }
  </script>
</body>
</html>
