<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLucid</title>
  <script>
    document.documentElement.style.display='none';
    fetch('/api/v1/auth/me').then(r=>{
      if(!r.ok) fetch('/api/v1/auth/setup-status').then(r=>r.json()).then(s=>{
        location.href=s.needs_setup?'/install.html':'/signin.html';
      });
      else document.documentElement.style.display='';
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        sidebar: { DEFAULT: '#1C1C28', hover: '#2A2A3C' },
        accent: { DEFAULT: '#155EEF', light: '#EFF4FF', hover: '#1849C6' },
      }}}
    }
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/pinned-apps.js"></script>
  <script src="/js/avatar.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif}
    .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;color:#A0A0B0;font-size:14px;cursor:pointer;transition:all .15s}
    .sidebar-item:hover{background:#2A2A3C;color:#E0E0EE}
    .sidebar-item.active{background:#2D2D40;color:#fff}
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden" x-data="appsCenter()" x-init="init()">

  <!-- Sidebar -->
  <aside class="w-56 bg-sidebar flex flex-col shrink-0">
    <div class="px-4 py-5 flex items-center gap-2.5">
      <img src="/images/logo.png" alt="OpenLucid" class="w-8 h-8 rounded-lg">
      <span class="text-white font-semibold text-base">OpenLucid</span>
    </div>
    <nav class="flex-1 px-3 space-y-1 mt-2">
      <a href="/" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span x-text="t('sidebar_offers')"></span>
      </a>
            <a href="/apps.html" class="sidebar-item active">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        <span x-text="t('sidebar_apps')"></span>
      </a>
      <a href="/brandkit-list.html" class="sidebar-item">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
        <span x-text="t('sidebar_brandkit')"></span>
      </a>
    </nav>
    <div class="px-3 pb-3 mt-auto">
      <div class="text-[10px] text-white/25 text-center">Powered by OpenLucid</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-14 bg-white border-b flex items-center justify-between px-6 shrink-0">
      <h1 class="text-base font-semibold text-gray-800" x-text="t('page_title')"></h1>
      <div id="avatar-mount"></div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <!-- Loading -->
      <div x-show="loading" class="flex items-center justify-center h-64">
        <div class="text-sm text-gray-400" x-text="t('loading')"></div>
      </div>

      <!-- App Grid -->
      <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <template x-for="app in apps" :key="app.app_id">
          <!-- Active card -->
          <div x-show="app.status === 'active'"
               class="bg-white rounded-xl border border-gray-200 p-5 flex flex-col gap-3 hover:shadow-md hover:border-accent/30 transition-all cursor-pointer"
               @click="openApp(app)">
            <div class="flex items-start justify-between">
              <div class="text-3xl leading-none" x-text="app.icon"></div>
              <button @click.stop="togglePin(app.app_id)"
                      :title="isPinned(app.app_id) ? t('unpin') : t('pin_to_nav')"
                      class="p-1 rounded-lg transition-colors"
                      :class="isPinned(app.app_id)
                        ? 'text-accent bg-accent/10 hover:bg-accent/20'
                        : 'text-gray-300 hover:text-gray-500 hover:bg-gray-100'">
                <!-- 已 pin：实心书签 -->
                <svg x-show="isPinned(app.app_id)" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M5 4a2 2 0 012-2h10a2 2 0 012 2v17l-7-3.5L5 21V4z"/>
                </svg>
                <!-- 未 pin：描边书签 -->
                <svg x-show="!isPinned(app.app_id)" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 4a2 2 0 012-2h10a2 2 0 012 2v17l-7-3.5L5 21V4z"/>
                </svg>
              </button>
            </div>
            <div>
              <div class="font-semibold text-gray-800 text-sm" x-text="app.name"></div>
              <div class="text-xs text-gray-500 mt-1 leading-relaxed" x-text="app.description"></div>
            </div>
            <div class="flex flex-wrap gap-1.5 mt-auto">
              <span class="text-[11px] px-2 py-0.5 bg-accent/8 text-accent rounded-full border border-accent/15" x-text="app.task_type.replace('_', ' ')"></span>
              <template x-for="entity in app.required_entities" :key="entity">
                <span class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full" x-text="entity"></span>
              </template>
            </div>
            <button class="mt-1 w-full bg-accent text-white text-[13px] font-medium py-2 rounded-lg hover:bg-accent-hover transition-colors"
                    x-text="t('open')">
            </button>
          </div>

          <!-- Coming soon card -->
          <div x-show="app.status === 'coming_soon'"
               class="bg-gray-50 rounded-xl border border-gray-100 p-5 flex flex-col gap-3 opacity-60">
            <div class="flex items-start justify-between">
              <div class="text-3xl leading-none grayscale" x-text="app.icon"></div>
              <span class="text-[11px] font-medium px-2 py-0.5 rounded-full bg-gray-100 text-gray-400 border border-gray-200" x-text="t('coming_soon')"></span>
            </div>
            <div>
              <div class="font-semibold text-gray-500 text-sm" x-text="app.name"></div>
              <div class="text-xs text-gray-400 mt-1 leading-relaxed" x-text="app.description"></div>
            </div>
            <div class="flex flex-wrap gap-1.5 mt-auto">
              <span class="text-[11px] px-2 py-0.5 bg-gray-100 text-gray-400 rounded-full" x-text="app.task_type.replace('_', ' ')"></span>
            </div>
            <button disabled class="mt-1 w-full bg-gray-200 text-gray-400 text-[13px] font-medium py-2 rounded-lg cursor-not-allowed"
                    x-text="t('coming_soon')">
            </button>
          </div>
        </template>
      </div>
    </main>
  </div>

  <script>
    function appsCenter() {
      return {
        apps: [],
        loading: true,
        pinnedApps: [],

        async init() {
          document.title = t('page_title') + ' - OpenLucid';
          this.pinnedApps = getPinnedApps();
          try {
            const res = await fetch(`/api/v1/apps?lang=${window._odLang}`);
            if (res.ok) this.apps = await res.json();
          } catch(e) {
            console.error(e);
          } finally {
            this.loading = false;
          }
        },

        openApp(app) {
          if (app.status !== 'active') return;
          if (app.slug === 'topic-studio') {
            location.href = '/topic-studio.html';
          } else if (app.slug === 'kb-qa') {
            location.href = '/kb-qa.html';
          } else if (app.slug === 'script-writer') {
            location.href = '/script-writer.html';
          }
        },

        isPinned(appId) {
          return this.pinnedApps.includes(appId);
        },

        togglePin(appId) {
          togglePinnedApp(appId);
          this.pinnedApps = getPinnedApps();
        },
      };
    }
  </script>
</body>
</html>
