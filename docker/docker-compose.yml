services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-openlucid}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openlucid}
      POSTGRES_DB: ${DB_NAME:-openlucid}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openlucid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${APP_PORT:-80}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-openlucid}:${DB_PASSWORD:-openlucid}@postgres:5432/${DB_NAME:-openlucid}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      STORAGE_BASE_PATH: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MAIL_TYPE: ${MAIL_TYPE:-}
      MAIL_FROM: ${MAIL_FROM:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      APP_URL: ${APP_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  db_data:
  uploads:
